- hosts: k8s_control_plane
  become: true
  tasks:
    - name: kubeadm init
      command: >
        kubeadm init
        --pod-network-cidr={{ pod_cidr }}
        --apiserver-advertise-address={{ ansible_default_ipv4.address }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: .kube ディレクトリを作成
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        mode: "0755"

    - name: admin.conf を ubuntu ユーザーにコピー
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        mode: "0600"
        remote_src: true

    - name: Helm をインストール
      shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Cilium Helm リポジトリを追加
      become_user: ubuntu
      command: helm repo add cilium https://helm.cilium.io/
      register: helm_repo
      changed_when: "'already exists' not in helm_repo.stderr"

    - name: Cilium CNI をインストール
      become_user: ubuntu
      shell: |
        helm upgrade --install cilium cilium/cilium \
          --namespace kube-system \
          --set ipam.mode=kubernetes \
          --set kubeProxyReplacement=false
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: join コマンドを取得
      command: kubeadm token create --print-join-command
      register: join_command

    - name: join コマンドを fact として保存
      set_fact:
        k8s_join_command: "{{ join_command.stdout }}"
