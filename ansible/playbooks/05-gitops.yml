- hosts: k8s_control_plane
  become: true
  tasks:
    - name: ArgoCD namespace を作成
      become_user: ubuntu
      command: kubectl create namespace argocd
      args:
        creates: /tmp/argocd-ns-created
      register: ns_result
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

    - name: ArgoCD をインストール
      become_user: ubuntu
      command: >
        kubectl apply -n argocd
        -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: ArgoCD が Ready になるまで待機
      become_user: ubuntu
      command: >
        kubectl rollout status deployment/argocd-server
        -n argocd --timeout=120s
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: argocd CLI をインストール
      shell: |
        VERSION=$(curl -s https://raw.githubusercontent.com/argoproj/argo-cd/stable/VERSION)
        curl -sSL -o /usr/local/bin/argocd \
          https://github.com/argoproj/argo-cd/releases/download/v${VERSION}/argocd-linux-amd64
        chmod +x /usr/local/bin/argocd
      args:
        creates: /usr/local/bin/argocd

    - name: ArgoCD admin パスワードを取得
      become_user: ubuntu
      command: >
        kubectl -n argocd get secret argocd-initial-admin-secret
        -o jsonpath="{.data.password}"
      register: argocd_password_b64
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: ArgoCD 初期パスワードを表示
      debug:
        msg: "ArgoCD admin password (base64): {{ argocd_password_b64.stdout | b64decode }}"
