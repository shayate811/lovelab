- name: Kubernetes apt キーを追加
  apt_key:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
    state: present

- name: Kubernetes リポジトリを追加
  apt_repository:
    repo: "deb https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /"

- name: kubeadm・kubelet・kubectl をインストール
  apt:
    name:
      - "kubelet={{ k8s_version }}.*"
      - "kubeadm={{ k8s_version }}.*"
      - "kubectl={{ k8s_version }}.*"
    update_cache: true

- name: K8s パッケージを hold（apt upgrade で上書きされないよう固定）
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: kubelet を有効化
  service:
    name: kubelet
    enabled: true
