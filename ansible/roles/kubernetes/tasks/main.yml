- name: /etc/apt/keyrings ディレクトリを作成
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Kubernetes GPG キーを追加
  shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key | \
    gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Kubernetes リポジトリを追加
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /"
    filename: kubernetes

- name: kubeadm・kubelet・kubectl をインストール
  apt:
    name:
      - "kubelet={{ k8s_version }}.*"
      - "kubeadm={{ k8s_version }}.*"
      - "kubectl={{ k8s_version }}.*"
    update_cache: true

- name: K8s パッケージを hold（apt upgrade で上書きされないよう固定）
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: kubelet を有効化
  service:
    name: kubelet
    enabled: true
